name: メール配信スケジュール処理

on:
  schedule:
    # 毎時 0 分に実行（JST = UTC+9）
    - cron: '0 * * * *'
  workflow_dispatch: # GitHub 画面から手動実行も可能

jobs:
  process-emails:
    runs-on: ubuntu-latest
    steps:
      - name: セミナーメール配信スケジュールを処理
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://events.allianceforum.org/api/email-schedules/process)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: email-schedules/process returned $HTTP_CODE"
            exit 1
          fi

      - name: セミナー参加者をメルマガマスターDBへ同期
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://events.allianceforum.org/api/newsletter/sync-from-registrations)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Warning: sync-from-registrations returned $HTTP_CODE (non-fatal)"
          fi

      - name: メルマガ予約配信を処理（バッチループ）
        run: |
          MAX_BATCHES=500
          BATCH=0
          CAMPAIGN_ID=""

          while [ $BATCH -lt $MAX_BATCHES ]; do
            # Batch 0 はキャンペーンを自動選択、以降は同じ campaign_id を指定して続きを送信
            if [ -z "$CAMPAIGN_ID" ]; then
              PAYLOAD="{\"offset\": $(( BATCH * 100 ))}"
            else
              PAYLOAD="{\"campaign_id\": \"$CAMPAIGN_ID\", \"offset\": $(( BATCH * 100 ))}"
            fi

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              https://events.allianceforum.org/api/newsletter/campaigns/process-scheduled)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            echo "Batch $BATCH — HTTP: $HTTP_CODE"
            echo "Response: $BODY"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "Error: process-scheduled returned $HTTP_CODE"
              exit 1
            fi

            # Batch 0 のレスポンスから campaign_id を取得
            if [ -z "$CAMPAIGN_ID" ]; then
              CAMPAIGN_ID=$(echo "$BODY" | grep -o '"campaign_id":"[^"]*"' | head -1 | sed 's/"campaign_id":"//;s/"//')
            fi

            # has_more が false なら終了
            HAS_MORE=$(echo "$BODY" | grep -o '"has_more":true' || true)

            if [ -z "$HAS_MORE" ]; then
              echo "配信完了または対象なし。終了します。"
              break
            fi

            BATCH=$(( BATCH + 1 ))
          done
